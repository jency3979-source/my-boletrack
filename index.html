<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrow/Lend Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="loader">
        <p class="dot-loader"></p>
        <div class="spinner"></div>

        <p>Loading...</p>

    </div>
    <div id="loginPage">

        <h2>Login / Signup</h2>

        <input type="text" id="username" placeholder="Username"><br>
        <div class="password-box">
            <input type="password" id="password" placeholder="Password">
            <span class="toggle-eye" onclick="togglePassword()">

            </span><br>
        </div>
        <div id="btn-group">
            <div class="signup-top">

                <button class="auth-btn" onclick="signup()">

                    Sign Up

                </button>

            </div>


            <div class="auth-row">

                <p class="auth-label">

                    Already have an account?

                </p>

                <button class="auth-btn" onclick="login()">

                    Login

                </button>

            </div>
            <p class="forgot" onclick="forgotPassword()">

                Forgot Password?

            </p>
        </div>
        <p id="msg"></p>

        <div class="mode-container">
            <span id="modeIcon"> ☀️ </span>
            <label class="switch">
                <input type="checkbox" id="modeToggle" onchange="toggleMode()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="appPage" style="display:none;">

        <div class="top-bar">

            <h1 class="title">
                💰 Borrow / Lend Tracker
            </h1>

            <button class="logout-btn" onclick="logout()">

                Logout

            </button>

        </div>
        <div id="dashboard">

            <div class="card">
                <h3>Borrow</h3>
                <p id="borrowCount">Count: 0</p>
                <p id="totalBorrow">Total: ₹0</p>
            </div>

            <div class="card">
                <h3>Lend</h3>
                <p id="lendCount">Count: 0</p>
                <p id="totalLent">Total: ₹0</p>
            </div>
        </div>
        <br><br>
        <div class="input-group">
            <div class="form-group">
                <input type="text" id="name" placeholder="Person Name">

                <input type="number" id="amount" placeholder="Amount">

                <select id="type">
                    <option value="borrow">Borrowed</option>
                    <option value="lend">Lended</option>

                </select>
            </div>
            <button id="addBtn" onclick="addEntry()">Add</button>
        </div>
        <div id="tableSection">
            <h2>Records</h2>
            <table id="recordTable">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>B/L</th>
                                <th>Name</th>
                                <th>Amount</th>
                                <th>Balance</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="list"></tbody>
                    </table>
                </div>
        </div>
        <script src="script.js"></script>
        <script type="module" src="firebase.js"></script>
</body>

</html>
